display_information:
  name: OASIS
  description: OpenClaw Antidote for Suspicious Injection Signals
  background_color: "#4A154B"
features:
  bot_user:
    display_name: OASIS
    always_online: true
  app_home:
    home_tab_enabled: false
    messages_tab_enabled: true
    messages_tab_read_only_enabled: false
oauth_config:
  scopes:
    bot:
      - chat:write
      - reactions:read
      - reactions:write
      - channels:history
      - channels:read
settings:
  event_subscriptions:
    bot_events:
      - message.channels
      - reaction_added
  interactivity:
    is_enabled: true
  org_deploy_enabled: false
  socket_mode_enabled: true
  token_rotation_enabled: false
